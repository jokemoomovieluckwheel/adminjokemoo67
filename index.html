<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>คำนวณวันหมดอายุ</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .box {
        background: #ffffff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
        width: 320px;
    }
    h2 {
        margin-bottom: 15px;
    }
    .buttons button {
        margin: 5px;
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #0066ff;
        color: #fff;
        font-size: 14px;
    }
    .buttons button:hover {
        background: #004ecc;
    }
    .result {
        margin-top: 20px;
        font-size: 15px;
        line-height: 1.6;
    }
</style>
</head>
<body>

<div class="box">
    <h2>คำนวณวัน</h2>

    <div class="buttons">
        <button onclick="calculate(1)">1 วัน</button>
        <button onclick="calculate(3)">3 วัน</button>
        <button onclick="calculate(7)">7 วัน</button>
        <button onclick="calculate(15)">15 วัน</button>
        <button onclick="calculate(30)">30 วัน</button>
    </div>

    <div class="result" id="result">กรุณาเลือกจำนวนวัน</div>
</div>

<script>
function calculate(days) {
    const today = new Date();

    // เริ่มนับจากวันนี้ (รวมวันนี้)
    const endDate = new Date(today);
    endDate.setDate(today.getDate() + (days - 1));

    const format = (date) => {
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear();
        return `${d}/${m}/${y}`;
    };

    document.getElementById("result").innerHTML = `
        วันที่เริ่มต้น: <b>${format(today)}</b><br>
        จำนวน: <b>${days} วัน</b><br>
        วันที่สิ้นสุด: <b>${format(endDate)}</b>
    `;
}
</script>

</body>
</html>
