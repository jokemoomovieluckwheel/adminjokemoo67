<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบคำนวณวันหมดอายุ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image" href="logo.png">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --main: #7c7cff;
    --neon: #22d3ee;
    --green: #22c55e;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Prompt', sans-serif;
    background: radial-gradient(circle at top, #1e1b4b, #020617);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* glow background */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--neon), transparent 70%);
    top: -200px;
    left: -200px;
    opacity: 0.35;
    filter: blur(60px);
}

body::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--main), transparent 70%);
    bottom: -180px;
    right: -180px;
    opacity: 0.35;
    filter: blur(60px);
}

.app {
    width: 390px;
    padding: 28px;
    border-radius: 26px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    color: #fff;
    position: relative;
    z-index: 1;
}

.header {
    text-align: center;
    margin-bottom: 24px;
}

.header h1 {
    font-family: 'Kanit', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.4px;
}

.header p {
    font-size: 13px;
    opacity: 0.85;
    margin-top: 8px;
}

.days {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
}

.day-btn {
    position: relative;
    padding: 16px 0;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    font-family: 'Kanit', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
    transition: 0.3s;
    overflow: hidden;
}

.day-btn::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--main), var(--neon));
    opacity: 0;
    transition: 0.3s;
}

.day-btn span {
    position: relative;
    z-index: 1;
}

.day-btn:hover::after {
    opacity: 0.35;
}

.day-btn.active::after {
    opacity: 1;
}

.day-btn.active {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 15px 35px rgba(99,102,241,0.6);
}

.result {
    margin-top: 26px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
    font-size: 14px;
    line-height: 1.9;
    animation: fadeUp 0.4s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(12px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.highlight {
    font-family: 'Kanit', sans-serif;
    font-size: 19px;
    font-weight: 800;
    background: linear-gradient(135deg, #a5b4fc, #67e8f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.copy-btn {
    margin-top: 16px;
    width: 100%;
    padding: 16px;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    font-family: 'Kanit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
    box-shadow: 0 15px 40px rgba(34,197,94,0.5);
    display: none;
    transition: 0.25s;
}

.copy-btn:hover {
    transform: translateY(-2px);
}

.toast {
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 18px;
    border-radius: 999px;
    background: rgba(34,197,94,0.95);
    font-family: 'Kanit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    display: none;
}
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>คำนวณวันหมดอายุ</h1>
    </div>

    <div class="days">
        <button class="day-btn" onclick="selectDay(this,1)"><span>1 วัน</span></button>
        <button class="day-btn" onclick="selectDay(this,3)"><span>3 วัน</span></button>
        <button class="day-btn" onclick="selectDay(this,7)"><span>7 วัน</span></button>
        <button class="day-btn" onclick="selectDay(this,15)"><span>15 วัน</span></button>
        <button class="day-btn" onclick="selectDay(this,30)"><span>30 วัน</span></button>
    </div>

    <div class="result" id="result">
        เลือกจำนวนวันที่ต้องการ
    </div>

    <button class="copy-btn" id="copyBtn" onclick="copyDate()">
        คัดลอกวันหมดอายุ
    </button>

    <div class="toast" id="toast">คัดลอกเรียบร้อยแล้ว</div>
</div>

<script>
let finalDateText = "";

function selectDay(el, days) {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    calculate(days);
}

function calculate(days) {
    const today = new Date();
    let endDate = new Date(today);

    if (days === 1) {
        endDate.setDate(today.getDate() + 1);
    } else {
        endDate.setDate(today.getDate() + (days - 1));
    }

    const f = d =>
        `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;

    finalDateText = f(endDate);

    document.getElementById("result").innerHTML = `
        วันนี้: <b>${f(today)}</b><br>
        จำนวน: <b>${days} วัน</b><br>
        วันหมดอายุ: <span class="highlight">${finalDateText}</span>
    `;

    document.getElementById("copyBtn").style.display = "block";
}

function copyDate() {
    navigator.clipboard.writeText(finalDateText).then(() => {
        const t = document.getElementById("toast");
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 2000);
    });
}
</script>

</body>
</html>
