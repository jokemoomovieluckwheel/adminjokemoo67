<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>JOKEMOO ADMIN DAY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #ff1f1f;
    --primary-light: #ff6b6b;
    --primary-dark: #cc0000;
    --success: #10b981;
    --success-glow: #34d399;
    --purple: #a855f7;
    --purple-light: #c084fc;
    --gold: #fbbf24;
    --gold-light: #fcd34d;
    --dark-bg: #0a0a0f;
    --card-bg: rgba(255, 255, 255, 0.03);
    --card-border: rgba(255, 255, 255, 0.08);
    --card-border-hover: rgba(255, 255, 255, 0.15);
    --text-primary: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.6);
    --text-muted: rgba(255, 255, 255, 0.4);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
}

html, body {
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    scroll-behavior: smooth;
}

body {
    font-family: 'Prompt', sans-serif;
    background: radial-gradient(ellipse at top, #1a0a0a 0%, #0a0a0f 40%, #050508 70%, #000000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Smooth entrance animations with stagger */
.app > * {
    animation: staggerFadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
}

.app-header { animation-delay: 0.1s; }
.left-section { animation-delay: 0.2s; }
.right-section { animation-delay: 0.3s; }

@keyframes staggerFadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Animated Background Orbs */
.bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: orbFloat 15s ease-in-out infinite;
}

.orb-1 {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255, 31, 31, 0.15), transparent 70%);
    top: -200px;
    left: -200px;
    animation-delay: 0s;
}

.orb-2 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.12), transparent 70%);
    bottom: -150px;
    right: -150px;
    animation-delay: -5s;
}

.orb-3 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.08), transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: -10s;
}

@keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(40px, -40px) scale(1.08); }
    50% { transform: translate(-30px, 30px) scale(0.95); }
    75% { transform: translate(30px, 40px) scale(1.05); }
}

/* Floating Particles */
.particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
}

.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: particleFloat 12s ease-in-out infinite;
    box-shadow: 0 0 15px var(--gold), 0 0 30px var(--gold-light);
}

.particle:nth-child(1) { left: 5%; animation-delay: 0s; animation-duration: 14s; }
.particle:nth-child(2) { left: 15%; animation-delay: 1.5s; animation-duration: 16s; }
.particle:nth-child(3) { left: 25%; animation-delay: 3s; animation-duration: 13s; }
.particle:nth-child(4) { left: 40%; animation-delay: 0.5s; animation-duration: 18s; }
.particle:nth-child(5) { left: 60%; animation-delay: 2s; animation-duration: 15s; }
.particle:nth-child(6) { left: 75%; animation-delay: 4s; animation-duration: 12s; }
.particle:nth-child(7) { left: 85%; animation-delay: 1s; animation-duration: 17s; }
.particle:nth-child(8) { left: 95%; animation-delay: 3.5s; animation-duration: 14s; }

@keyframes particleFloat {
    0% { 
        transform: translateY(100vh) rotate(0deg) scale(0.5); 
        opacity: 0; 
    }
    10% { 
        opacity: 0.8; 
        transform: translateY(90vh) rotate(45deg) scale(1);
    }
    50% {
        opacity: 0.5;
        transform: translateY(50vh) rotate(180deg) scale(0.8);
    }
    90% { 
        opacity: 0.8;
        transform: translateY(10vh) rotate(315deg) scale(1);
    }
    100% { 
        transform: translateY(-100vh) rotate(360deg) scale(0.5); 
        opacity: 0; 
    }
}

/* Main App Container */
.app {
    width: 900px;
    padding: 40px;
    border-radius: 32px;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.04) 100%);
    backdrop-filter: blur(50px);
    box-shadow:
        0 0 0 1px var(--card-border),
        0 50px 150px rgba(0,0,0,0.6),
        inset 0 0 100px rgba(255,255,255,0.02),
        inset 0 1px 0 rgba(255,255,255,0.1);
    color: var(--text-primary);
    position: relative;
    z-index: 10;
    animation: appEnter 1s cubic-bezier(0.2, 0.8, 0.2, 1), appFloat 6s ease-in-out infinite;
}

@keyframes appEnter {
    from {
        opacity: 0;
        transform: translateY(50px) scale(0.92);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes appFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

/* Header */
.app-header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.app-header .logo {
    width: 60px;
    height: auto;
    filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.5));
    animation: logoFloat 4s ease-in-out infinite, logoGlow 3s ease-in-out infinite;
}

@keyframes logoFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-4px) rotate(2deg); }
}

@keyframes logoGlow {
    0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.5)); }
    50% { filter: drop-shadow(0 0 25px rgba(255, 107, 107, 0.8)); }
}

.app-header h1 {
    font-family: 'Kanit', sans-serif;
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #ffb3b3 35%, #ff6b6b 65%, #ff1f1f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    text-shadow: 0 0 60px rgba(255, 107, 107, 0.4);
    animation: titleGlow 3s ease-in-out infinite;
}

@keyframes titleGlow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
}

.app-header p {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* Divider Line */
.header-divider {
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    margin: 16px auto;
    border-radius: 2px;
    animation: dividerPulse 2s ease-in-out infinite;
}

@keyframes dividerPulse {
    0%, 100% { opacity: 0.5; width: 80px; }
    50% { opacity: 1; width: 120px; }
}

/* Main Layout */
.main-layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 28px;
}

/* Left Section */
.left-section {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 0;
}

/* Date Mode Toggle - Premium */
.date-toggle {
    display: flex;
    gap: 8px;
    background: var(--card-bg);
    padding: 8px;
    border-radius: 18px;
    border: 1px solid var(--card-border);
    box-shadow: 
        inset 0 2px 15px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.05);
    position: relative;
    z-index: 25;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.date-toggle:hover {
    box-shadow: 
        inset 0 2px 20px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.1),
        0 4px 15px rgba(0,0,0,0.3);
}

.toggle-btn {
    flex: 1;
    padding: 14px 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'Kanit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
}

.toggle-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
}

.toggle-btn:hover::before {
    transform: translateX(100%);
}

.toggle-btn.today {
    background: linear-gradient(135deg, var(--success) 0%, var(--success-glow) 100%);
    color: #fff;
    box-shadow: 
        0 6px 25px rgba(16, 185, 129, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
    animation: toggleGlow 3s ease-in-out infinite;
}

@keyframes toggleGlow {
    0%, 100% { 
        box-shadow: 
            0 6px 25px rgba(16, 185, 129, 0.5),
            inset 0 1px 0 rgba(255,255,255,0.3);
    }
    50% { 
        box-shadow: 
            0 8px 30px rgba(16, 185, 129, 0.7),
            inset 0 1px 0 rgba(255,255,255,0.4);
    }
}

.toggle-btn.today.active {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 
        0 10px 35px rgba(16, 185, 129, 0.6),
        inset 0 1px 0 rgba(255,255,255,0.3);
}

.toggle-btn.custom {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid transparent;
}

.toggle-btn.custom.active {
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-light) 100%);
    color: #fff;
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-2px) scale(1.02);
    box-shadow: 
        0 10px 35px rgba(168, 85, 247, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.2);
}

/* Date Display Card */
.date-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 24px;
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(16, 185, 129, 0.06));
    border-radius: 18px;
    border: 1px solid rgba(16, 185, 129, 0.25);
    box-shadow:
        inset 0 0 30px rgba(16, 185, 129, 0.08),
        0 4px 20px rgba(16, 185, 129, 0.15);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 25;
}

.date-display:hover {
    transform: translateY(-2px);
    box-shadow:
        inset 0 0 50px rgba(16, 185, 129, 0.15),
        0 8px 35px rgba(16, 185, 129, 0.25),
        0 0 0 1px rgba(16, 185, 129, 0.1);
}

.date-display .icon {
    font-size: 22px;
    filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.6));
    animation: iconPulse 2s ease-in-out infinite;
}

@keyframes iconPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

.date-display .text {
    font-family: 'Kanit', sans-serif;
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
}

.date-display .date {
    font-family: 'Kanit', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--success-glow);
    text-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
    letter-spacing: 0.5px;
}

/* Date Input Container */
.date-input-container {
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: visible;
    position: relative;
    z-index: 20;
}

.date-input-container.hidden {
    max-height: 0;
    opacity: 0;
    visibility: hidden;
}

.date-input-container.visible {
    max-height: 180px;
    opacity: 1;
    visibility: visible;
}

/* Date Input Fields - Day/Month/Year */
.date-input-wrapper {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 18px;
    border: 1px solid var(--card-border);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 30;
}

.date-input-wrapper:hover {
    border-color: rgba(255, 107, 107, 0.3);
    box-shadow: 
        0 0 0 1px rgba(255, 107, 107, 0.1),
        0 4px 20px rgba(0,0,0,0.2);
}

.date-input-wrapper:focus-within {
    border-color: var(--primary);
    box-shadow:
        0 0 0 3px rgba(255, 31, 31, 0.15),
        0 0 60px rgba(255, 31, 31, 0.2),
        inset 0 0 40px rgba(255, 31, 31, 0.08);
    transform: translateY(-2px);
}

.date-input-label {
    font-family: 'Kanit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
}

.date-input-label .icon {
    font-size: 16px;
}

.date-fields {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
}

.date-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.date-field label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.date-field input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.06);
    color: var(--text-primary);
    font-family: 'Kanit', sans-serif;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.date-field input:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255, 107, 107, 0.3);
}

.date-field input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(255,255,255,0.12);
    box-shadow: 
        0 0 0 3px rgba(255, 31, 31, 0.15),
        0 0 30px rgba(255, 31, 31, 0.2);
    transform: translateY(-2px) scale(1.02);
}

.date-field input::placeholder {
    color: var(--text-muted);
    font-weight: 500;
}

/* Days Container - Scrollable */
.days-container {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid var(--card-border);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 340px;
    position: relative;
    overflow: hidden;
    z-index: 1;
    box-shadow: 
        inset 0 0 50px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.05);
    animation: containerGlow 4s ease-in-out infinite;
}

@keyframes containerGlow {
    0%, 100% { 
        box-shadow: 
            inset 0 0 50px rgba(0,0,0,0.3),
            0 0 0 1px rgba(255,255,255,0.05);
    }
    50% { 
        box-shadow: 
            inset 0 0 60px rgba(255,31,31,0.1),
            0 0 0 1px rgba(255,107,107,0.15);
    }
}

.days-container::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: linear-gradient(to bottom, var(--card-bg), transparent);
    pointer-events: none;
    z-index: 10;
}

.days-container::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: linear-gradient(to top, var(--card-bg), transparent);
    pointer-events: none;
    z-index: 10;
}

.days-wrapper {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 10px;
    padding-left: 2px;
    scrollbar-gutter: stable;
    position: relative;
    z-index: 5;
}

/* Premium Scrollbar */
.days-wrapper::-webkit-scrollbar {
    width: 8px;
}

.days-wrapper::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
}

.days-wrapper::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-light) 50%, var(--primary) 100%);
    border-radius: 12px;
    border: 2px solid rgba(0,0,0,0.4);
    box-shadow: 0 0 20px rgba(255, 31, 31, 0.3);
}

.days-wrapper::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, var(--primary-light) 0%, var(--primary) 50%, var(--primary-light) 100%);
    box-shadow: 0 0 30px rgba(255, 31, 31, 0.5);
}

.days {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    position: relative;
    z-index: 3;
    padding: 8px 4px;
    margin: 4px 0;
}

/* Day Button - Ultra Premium */
.day-btn {
    position: relative;
    padding: 16px 10px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    font-family: 'Kanit', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-primary);
    background: linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
    transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    overflow: hidden;
}

/* Glow effect behind button */
.day-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--primary), var(--primary-light), var(--purple));
    border-radius: 16px;
    opacity: 0;
    transition: all 0.35s ease;
    z-index: 0;
}

/* Shine effect */
.day-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transition: left 0.5s ease;
    border-radius: 16px;
}

.day-btn span {
    position: relative;
    z-index: 1;
    display: block;
    transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1);
}

/* Hover state */
.day-btn:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 107, 107, 0.35);
    box-shadow: 
        0 8px 25px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.12);
}

.day-btn:hover::before {
    opacity: 0.15;
}

.day-btn:hover::after {
    left: 100%;
}

.day-btn:hover span {
    transform: translateY(-1px);
}

/* Active/Selected state */
.day-btn.active {
    transform: translateY(-2px);
    border-color: var(--primary);
    background: linear-gradient(145deg, rgba(255,31,31,0.22) 0%, rgba(255,31,31,0.08) 100%);
    box-shadow: 
        0 12px 35px rgba(255, 31, 31, 0.45),
        0 0 0 1px var(--primary),
        inset 0 1px 0 rgba(255,255,255,0.2);
}

.day-btn.active::before {
    opacity: 1;
}

.day-btn.active span {
    transform: translateY(-1px);
    text-shadow: 0 0 12px rgba(255,255,255,0.35);
}

/* Right Section */
.right-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* Result Card - Ultra Premium */
.result-card {
    flex: 1;
    padding: 28px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.08) 100%);
    border: 1px solid var(--card-border);
    box-shadow:
        0 30px 80px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.15),
        0 0 0 1px rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    min-height: 320px;
    position: relative;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.result-card:hover {
    box-shadow:
        0 40px 100px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.2),
        0 0 0 1px rgba(255,255,255,0.08);
}

.result-card::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.03), transparent);
    animation: cardShimmer 10s linear infinite;
}

@keyframes cardShimmer {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
    font-size: 15px;
    position: relative;
    z-index: 1;
}

.empty-state .icon {
    font-size: 64px;
    margin-bottom: 20px;
    opacity: 0.3;
    filter: grayscale(0.5);
    animation: emptyIconFloat 3s ease-in-out infinite, emptyIconGlow 4s ease-in-out infinite;
    display: inline-block;
}

@keyframes emptyIconFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
}

@keyframes emptyIconGlow {
    0%, 100% { 
        opacity: 0.3;
        filter: grayscale(0.5) drop-shadow(0 0 0 transparent);
    }
    50% { 
        opacity: 0.5;

<script>
let finalDateText = "";
let isTodayMode = true;
let selectedDays = null;

const formatDate = (d) => {
    const day = String(d.getDate()).padStart(2, '0');
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const year = d.getFullYear();
    return `${day}/${month}/${year}`;
};

const formatMonthText = (days) => {
    if (days >= 365 && days % 365 === 0) {
        const years = days / 365;
        return `${years} ปี`;
    }
    if (days >= 30 && days % 30 === 0) {
        const months = days / 30;
        return `${months} เดือน`;
    }
    return `${days} วัน`;
};

// Get days in month
function getDaysInMonth(month, year) {
    return new Date(year, month, 0).getDate();
}

// Validate Day input (check actual days in selected month)
function validateDay(input) {
    input.value = input.value.replace(/[^0-9]/g, '');
    if (input.value.length > 0) {
        let val = parseInt(input.value);
        const month = parseInt(document.getElementById('inputMonth').value) || 1;
        const year = parseInt(document.getElementById('inputYear').value) || new Date().getFullYear();
        const maxDays = getDaysInMonth(month, year);
        
        if (val > maxDays) {
            input.value = String(maxDays).padStart(2, '0');
            showDayWarning(maxDays, month);
        }
        if (val < 1 && input.value !== '') input.value = '1';
    }
}

// Show warning when day exceeds month limit
function showDayWarning(maxDays, month) {
    const monthNames = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
                        'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
    showToast(`⚠️ เดือน ${monthNames[month-1]} มีสูงสุด ${maxDays} วัน`, "warning");
}

// Validate Month input (1-12)
function validateMonth(input) {
    input.value = input.value.replace(/[^0-9]/g, '');
    if (input.value.length > 0) {
        let val = parseInt(input.value);
        if (val > 12) input.value = '12';
        if (val < 1 && input.value !== '') input.value = '1';
        
        // Re-validate day when month changes
        const dayInput = document.getElementById('inputDay');
        if (dayInput.value) {
            validateDay(dayInput);
        }
    }
}

// Validate Year input (4 digits)
function validateYear(input) {
    input.value = input.value.replace(/[^0-9]/g, '');
    
    // Re-validate day when year changes (for leap year)
    const dayInput = document.getElementById('inputDay');
    const monthInput = document.getElementById('inputMonth');
    if (dayInput.value && monthInput.value) {
        validateDay(dayInput);
    }
}

// Get date from input fields
function getInputDate() {
    const day = parseInt(document.getElementById('inputDay').value) || 1;
    const month = parseInt(document.getElementById('inputMonth').value) || 1;
    const year = parseInt(document.getElementById('inputYear').value) || new Date().getFullYear();
    
    return new Date(year, month - 1, day);
}

// Set input fields to a date
function setInputDate(date) {
    document.getElementById('inputDay').value = String(date.getDate()).padStart(2, '0');
    document.getElementById('inputMonth').value = String(date.getMonth() + 1).padStart(2, '0');
    document.getElementById('inputYear').value = String(date.getFullYear());
}

document.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    document.getElementById('todayDate').textContent = formatDate(today);
    setInputDate(today);
});

function setTodayMode() {
    isTodayMode = true;
    document.getElementById('todayBtn').classList.add('active');
    document.getElementById('todayBtn').classList.remove('custom');
    document.getElementById('customBtn').classList.remove('active');
    document.getElementById('customBtn').classList.add('today');
    
    document.getElementById('todayDisplay').style.display = 'flex';
    document.getElementById('dateInputContainer').classList.remove('visible');
    document.getElementById('dateInputContainer').classList.add('hidden');
    
    const today = new Date();
    document.getElementById('todayDate').textContent = formatDate(today);
    setInputDate(today);
    
    if (selectedDays) {
        calculate(selectedDays);
    }
}

function setCustomMode() {
    isTodayMode = false;
    document.getElementById('customBtn').classList.add('active');
    document.getElementById('customBtn').classList.remove('today');
    document.getElementById('todayBtn').classList.remove('active');
    document.getElementById('todayBtn').classList.add('custom');
    
    document.getElementById('todayDisplay').style.display = 'none';
    document.getElementById('dateInputContainer').classList.remove('hidden');
    document.getElementById('dateInputContainer').classList.add('visible');
    
    setTimeout(() => {
        document.getElementById('inputDay').focus();
    }, 300);
    
    if (selectedDays) {
        calculateFromCustomDate();
    }
}

function getStartDate() {
    if (isTodayMode) {
        return new Date();
    } else {
        return getInputDate();
    }
}

function selectDay(el, days) {
    // Remove active from all buttons
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));

    // Add active to clicked button
    el.classList.add('active');

    // Set selected days and calculate
    selectedDays = days;
    calculate(days);
}

function calculate(days) {
    const startDate = getStartDate();
    let endDate = new Date(startDate);

    // Special case: 1 day = start date + 1 day
    if (days === 1) {
        endDate.setDate(startDate.getDate() + 1);
    }
    // For all other cases: add the exact number of days (start date = day 1)
    // Example: Start 30/03, select 30 days → 30/03 (day 1) + 29 = 28/04 (day 30)
    else {
        endDate.setDate(startDate.getDate() + days - 1);
    }

    finalDateText = formatDate(endDate);

    // Calculate actual days count (inclusive from start to end)
    const actualDays = days === 1 ? 1 : days;

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultContent').style.display = 'block';
    document.getElementById('resultCard').classList.add('show');

    document.getElementById('resultStart').textContent = formatDate(startDate);
    document.getElementById('resultDays').textContent = formatMonthText(days);
    document.getElementById('resultCount').textContent = `${actualDays} วัน`;
    document.getElementById('resultExpire').textContent = finalDateText;

    document.getElementById("copyBtn").style.display = "block";
}

function calculateFromCustomDate() {
    if (selectedDays) {
        calculate(selectedDays);
    }
}

function copyDate() {
    if (!finalDateText) {
        showToast("⚠️ ยังไม่มีข้อมูลวันหมดอายุ", "warning");
        return;
    }

    navigator.clipboard.writeText(finalDateText).then(() => {
        showToast("✅ คัดลอกวันหมดอายุเรียบร้อยแล้ว", "success");
    }).catch(err => {
        // Fallback: ลองใช้วิธีเก่าถ้า clipboard API ไม่ทำงาน
        const textArea = document.createElement("textarea");
        textArea.value = finalDateText;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.select();
        
        try {
            document.execCommand("copy");
            showToast("✅ คัดลอกวันหมดอายุเรียบร้อยแล้ว", "success");
        } catch (e) {
            showToast("❌ คัดลอกไม่สำเร็จ กรุณาลองใหม่", "error");
        }
        
        document.body.removeChild(textArea);
    });
}

// Show Toast Notification
function showToast(message, type = "success") {
    const toastRight = document.getElementById("toastRight");
    
    // ซ่อน toast ก่อน
    toastRight.classList.remove('show');
    
    // ตั้งค่าสีตามประเภท
    const colors = {
        success: {
            bg: 'linear-gradient(135deg, rgba(16, 185, 129, 0.95), rgba(52, 211, 153, 0.95))',
            icon: '✅'
        },
        error: {
            bg: 'linear-gradient(135deg, rgba(239, 68, 68, 0.95), rgba(248, 113, 113, 0.95))',
            icon: '❌'
        },
        warning: {
            bg: 'linear-gradient(135deg, rgba(245, 158, 11, 0.95), rgba(251, 191, 36, 0.95))',
            icon: '⚠️'
        },
        info: {
            bg: 'linear-gradient(135deg, rgba(59, 130, 246, 0.95), rgba(96, 165, 250, 0.95))',
            icon: 'ℹ️'
        }
    };
    
    const color = colors[type] || colors.success;
    
    setTimeout(() => {
        toastRight.innerHTML = `<span class="icon">${color.icon}</span><span>${message}</span>`;
        toastRight.style.background = color.bg;
        toastRight.classList.add('show');
        
        // ซ่อนอัตโนมัติหลังจาก 3 วินาที
        setTimeout(() => {
            toastRight.classList.remove('show');
        }, 3000);
    }, 100);
}

// Toggle Social Popup
function toggleSocialPopup() {
    const popup = document.getElementById('socialPopup');
    const btn = document.getElementById('socialToggleBtn');
    popup.classList.toggle('show');
    btn.classList.toggle('active');
}

// Close popup when clicking outside
document.addEventListener('click', function(event) {
    const popup = document.getElementById('socialPopup');
    const btn = document.getElementById('socialToggleBtn');
    if (popup && !popup.contains(event.target) && !btn.contains(event.target)) {
        popup.classList.remove('show');
        btn.classList.remove('active');
    }
});
